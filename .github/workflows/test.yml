name: Test Azure Function App (JavaScript ESM)

on:
  pull_request:
    branches:
      - main
      - deployTest
  workflow_dispatch: # This is supposed to generate a run on click button for this action once deplyed to main

jobs:
  run-tests:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22.18.0'

    - name: Install dependencies
      run: npm ci

    - name: Run unit tests with coverage
      run: npm test -- --coverage

    - name: Upload coverage report
      uses: actions/upload-artifact@v4
      with:
        name: coverage-report
        path: coverage
