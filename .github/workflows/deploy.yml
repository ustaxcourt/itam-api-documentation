name: Deploy Azure Function App (JavaScript ESM)

on:
  push:
    branches:
      - main
      - deployTest

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3
      with:
        ref: ${{ github.ref }}

    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '22.18.0'

    - name: Install dependencies from root
      run: npm ci

    - name: Run tests with coverage
      run: npm test -- --coverage

    - name: Prepare function app package
      run: |
        mkdir functionapp
        cp host.json functionapp/
        cp package.json functionapp/
        cp -R azure-functions functionapp/
        cp -R node_modules functionapp/

    - name: Zip function app
      run: |
        cd functionapp
        zip -r ../functionapp.zip .

    - name: Deploy to Azure Functions
      uses: Azure/functions-action@v1
      with:
        app-name: ${{ secrets.AZURE_FUNCTIONAPP_NAME }}
        package: functionapp.zip
        publish-profile: ${{ secrets.AZURE_CREDENTIALS }}

    - name: Clean up temporary functionapp folder
      run: rm -rf functionapp
