name: Deploy Azure Function App (JavaScript ESM)

on:
  push:
    branches:
      - main
      - deployTest

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3
      with:
        ref: ${{ github.ref }}

    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '22.18.0'

    - name: Install dependencies from root
      run: npm ci

    - name: Copy node_modules into azure-functions
      run: cp -R node_modules azure-functions/

    - name: Zip function app including host.json
      run: zip -r functionapp.zip azure-functions host.json

    - name: Deploy to Azure Functions
      uses: Azure/functions-action@v1
      with:
        app-name: ${{ secrets.AZURE_FUNCTIONAPP_NAME }}
        package: functionapp.zip
        publish-profile: ${{ secrets.AZURE_CREDENTIALS }}

    - name: Clean up node_modules from azure-functions
      run: rm -rf azure-functions/node_modules
