name: Deploy and Test Deployed ITAM Function App

permissions:
  contents: write

on:
  pull_request:
    branches:
      - main
      - devTest
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment (dev | test | prod)"
        required: false
        type: choice
        options:
          - dev
          - test
          - prod

concurrency:
  group: itam-functions-deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-deploy-and-test:
    runs-on: ubuntu-latest

    env:
      # App names
      APP_NAME_DEV: ${{ secrets.AZURE_FUNCTIONAPP_NAME_DEV }}
      APP_NAME_TEST: ${{ secrets.AZURE_FUNCTIONAPP_NAME_TEST }}
      APP_NAME_PROD: ${{ secrets.AZURE_FUNCTIONAPP_NAME_PROD }}

      # Publish profiles (XML)
      PUBLISH_PROFILE_DEV: ${{ secrets.AZURE_PUBLISH_PROFILE_DEV }}
      PUBLISH_PROFILE_TEST: ${{ secrets.AZURE_PUBLISH_PROFILE_TEST }}
      PUBLISH_PROFILE_PROD: ${{ secrets.AZURE_PUBLISH_PROFILE_PROD }}

      # Auth tenant + env URLs (if needed later)
      TENANTID: ${{ secrets.EXTERNALAUTHTENANTID }}
      DEVENVIROMENTURL: ${{ secrets.DevEnviromentURL }}
      TESTENVIROMENTURL: ${{ secrets.TestEnviromentURL }}

      # Dev client creds
      DEVCLIENT_ID: ${{ secrets.EXTERNALAUTHDEVCLIENTID }}
      DEVCLIENT_SECRET: ${{ secrets.EXTERNALAUTHDEVCLIENTSECRET }}

      # Test client creds
      TESTCLIENT_ID: ${{ secrets.EXTERNALAUTHTESTCLIENTID }}
      TESTCLIENT_SECRET: ${{ secrets.EXTERNALAUTHTESTCLIENTSECRET }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Decide environment early so later steps can reference it
      - name: Resolve target environment
        id: resolve_env
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${{ github.event_name }}" == "workflow_dispatch" && -n "${{ github.event.inputs.environment }}" ]]; then
            env_name="${{ github.event.inputs.environment }}"
          elif [[ "${{ github.event_name }}" == "pull_request" ]]; then
            branch="${{ github.base_ref }}"
            case "$branch" in
              main)    env_name="dev" ;;
              devTest) env_name="test" ;;
              *) echo "Unsupported PR base branch for auto-deploy: $branch"; exit 1 ;;
            esac
          else
            echo "Unsupported event: ${{ github.event_name }}"
            exit 1
          fi

          echo "env_name=$env_name" >> "$GITHUB_OUTPUT"
          echo "Resolved environment: $env_name"

      - name: Select env-specific secrets
        id: pick
        shell: bash
        run: |
          set -euo pipefail

          case "${{ steps.resolve_env.outputs.env_name }}" in
            dev)
              echo "APP_NAME=${APP_NAME_DEV}" >> "$GITHUB_OUTPUT"
              echo "PUBLISH_PROFILE=${PUBLISH_PROFILE_DEV}" >> "$GITHUB_OUTPUT"
              echo "CLIENTID=${DEVCLIENT_ID}" >> "$GITHUB_OUTPUT"
              echo "CLIENTSECRET=${DEVCLIENT_SECRET}" >> "$GITHUB_OUTPUT"
              ;;
            test)
              echo "APP_NAME=${APP_NAME_TEST}" >> "$GITHUB_OUTPUT"
              echo "PUBLISH_PROFILE=${PUBLISH_PROFILE_TEST}" >> "$GITHUB_OUTPUT"
              echo "CLIENTID=${TESTCLIENT_ID}" >> "$GITHUB_OUTPUT"
              echo "CLIENTSECRET=${TESTCLIENT_SECRET}" >> "$GITHUB_OUTPUT"
              ;;
            prod)
              echo "APP_NAME=${APP_NAME_PROD}" >> "$GITHUB_OUTPUT"
              echo "PUBLISH_PROFILE=${PUBLISH_PROFILE_PROD}" >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo "Unknown environment: ${{ steps.resolve_env.outputs.env_name }}"
              exit 1
              ;;
          esac

          echo "Deploying to app: ${{ steps.pick.outputs.APP_NAME }}"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22.18.0"
          cache: npm

      - name: Install Azure Functions Core Tools (optional)
        run: npm i -g azure-functions-core-tools@4 --unsafe-perm true

      # Optional: Validate OpenAPI only on dev/test
      - name: Validate OpenAPI schema
        if: |
          steps.resolve_env.outputs.env_name == 'dev' ||
          steps.resolve_env.outputs.env_name == 'test'
        uses: thiyagu06/openapi-validator-action@v1
        with:
          filepath: "./azure-functions/openapi.yml"

      # Build the deployable artifact so the script root contains:
      # host.json, package.json, index.js, apiController/*, node_modules, etc.
      - name: Prepare function app package (script root fix)
        shell: bash
        run: |
          set -euo pipefail

          rm -rf functionapp functionapp.zip

          # Stage folder that will become /home/site/wwwroot
          mkdir -p functionapp

          # Required root files
          test -f host.json || (echo "ERROR: host.json missing at repo root" && exit 1)
          test -f package.json || (echo "ERROR: package.json missing at repo root" && exit 1)
          test -f package-lock.json || (echo "ERROR: package-lock.json missing at repo root" && exit 1)

          cp host.json functionapp/
          cp package.json functionapp/
          cp package-lock.json functionapp/

          # Copy CONTENTS of azure-functions into root so index.js ends up at root
          test -d azure-functions || (echo "ERROR: azure-functions/ folder missing" && exit 1)
          cp -R azure-functions/* functionapp/

          # Install production deps into the staged root (needs package-lock.json present)
          pushd functionapp >/dev/null
          npm ci --omit=dev
          popd >/dev/null

      - name: Zip function app
        shell: bash
        run: |
          set -euo pipefail
          pushd functionapp >/dev/null
          zip -r ../functionapp.zip .
          popd >/dev/null

      - name: Verify ZIP integrity and required files
        shell: bash
        run: |
          set -euo pipefail

          ls -lah functionapp.zip
          du -h functionapp.zip

          # Must be a valid zip
          unzip -t functionapp.zip >/dev/null

          # Must have host.json at zip root
          unzip -l functionapp.zip | awk '{print $4}' | grep -x "host.json" >/dev/null || \
            (echo "ERROR: host.json not found at zip root" && exit 1)

          # Must have index.js at zip root for your programming model layout (based on what you shared)
          unzip -l functionapp.zip | awk '{print $4}' | grep -x "index.js" >/dev/null || \
            (echo "ERROR: index.js not found at zip root (script root layout wrong)" && exit 1)

          echo "ZIP checks passed."

      - name: Deploy to Azure Functions
        uses: Azure/functions-action@v1
        with:
          app-name: ${{ steps.pick.outputs.APP_NAME }}
          publish-profile: ${{ steps.pick.outputs.PUBLISH_PROFILE }}
          package: ./functionapp.zip

      - name: Dump Kudu deployment logs (on failure)
        if: failure()
        shell: bash
        env:
          PUBLISH_PROFILE: ${{ steps.pick.outputs.PUBLISH_PROFILE }}
          APP_NAME: ${{ steps.pick.outputs.APP_NAME }}
        run: |
          set -euo pipefail

          # Extract SCM user/pass from publish profile XML (do not echo them)
          user=$(python3 - <<'PY'
          import os, re
          xml=os.environ["PUBLISH_PROFILE"]
          m=re.search(r'userName="([^"]+)"', xml)
          print(m.group(1) if m else "")
          PY
          )

          pass=$(python3 - <<'PY'
          import os, re
          xml=os.environ["PUBLISH_PROFILE"]
          m=re.search(r'userPWD="([^"]+)"', xml)
          print(m.group(1) if m else "")
          PY
          )

          scm="https://${APP_NAME}.scm.azurewebsites.net"
          echo "Querying Kudu logs from: $scm"

          # Get latest deployment id
          id=$(curl -sS -u "$user:$pass" "$scm/api/deployments/latest" | python3 -c "import sys,json; print(json.load(sys.stdin).get('id',''))")
          echo "Latest deployment id: $id"

          echo "---- Kudu deployment log ----"
          curl -sS -u "$user:$pass" "$scm/api/deployments/$id/log" | python3 -m json.tool || true

          echo "---- Kudu deployment details ----"
          curl -sS -u "$user:$pass" "$scm/api/deployments/$id" | python3 -m json.tool || true

      - name: Clean up staging folder
        if: always()
        run: rm -rf functionapp

      # Only run auth + integration tests for dev/test
      - name: Acquire bearer token (dev/test only)
        if: |
          steps.resolve_env.outputs.env_name == 'dev' ||
          steps.resolve_env.outputs.env_name == 'test'
        id: api
        shell: bash
        run: |
          set -euo pipefail

          # jq is installed on ubuntu-latest, but keep this safe:
          command -v jq >/dev/null 2>&1 || (sudo apt-get update && sudo apt-get install -y jq)

          url="https://login.microsoftonline.com/${{ env.TENANTID }}/oauth2/v2.0/token"

          tmp_body="$(mktemp)"
          http_code=$(
            curl -sS -X POST "$url" \
              -H "Content-Type: application/x-www-form-urlencoded" \
              --data-urlencode "grant_type=client_credentials" \
              --data-urlencode "client_id=${{ steps.pick.outputs.CLIENTID }}" \
              --data-urlencode "client_secret=${{ steps.pick.outputs.CLIENTSECRET }}" \
              --data-urlencode "scope=api://ustc-itam-apis-authentication-${{ steps.resolve_env.outputs.env_name }}/.default" \
              -o "$tmp_body" \
              -w "%{http_code}"
          )

          echo "HTTP status: $http_code"

          if [[ "$http_code" != "200" ]]; then
            echo "Token request failed. Response body:"
            cat "$tmp_body" | jq . || cat "$tmp_body"
            rm -f "$tmp_body"
            exit 1
          fi

          token="$(cat "$tmp_body" | jq -r '.access_token')"
          rm -f "$tmp_body"

          if [[ -z "$token" || "$token" == "null" ]]; then
            echo "ERROR: token missing from response"
            exit 1
          fi

          echo "token=$token" >> "$GITHUB_OUTPUT"

      - name: Run integration tests (dev/test only)
        if: |
          steps.resolve_env.outputs.env_name == 'dev' ||
          steps.resolve_env.outputs.env_name == 'test'
        env:
          API_BASE_URL: https://${{ steps.pick.outputs.APP_NAME }}.azurewebsites.net
          BEARERTOKEN: "Bearer ${{ steps.api.outputs.token }}"
        shell: bash
        run: |
          set -euo pipefail
          npm ci
          npx jest --selectProjects integration --coverage=false
