openapi: "3.0.3"
info:
  title: Query Assets
  version: "1.0"
servers:
  - url: /api
paths:
  /v1/assets/{itemguid}:
    get:
      parameters:
        - name: guid
          in: query
          description: Guid of AssetId
          required: true
          schema:
            type: string

      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  activation:
                    type: boolean
                    nullable: true
                    example: null
                    enum:
                      - true
                      - false
                      - null
                  assetName:
                    type: string
                    example: "HP EliteDisplay E241i #166"
                    nullable: false
                  condition:
                    type: string
                    example: "Good"
                    nullable: false
                    enum:
                      - Excellent
                      - Good
                      - Poor
                      - Garbage
                      - Damaged
                      - New
                  itemStatus:
                    type: string
                    example: "Available"
                    nullable: false
                    enum:
                      - Assigned
                      - Available
                      - Kiosk
                      - Recycled
                      - Decommissioned
                      - Repair
                      - Inoperative
                      - Unknown
                      - Excess in Depot
                  location:
                    type: string
                    example: "G47"
                    nullable: true
                  phone:
                    type: string
                    nullable: true
                    example: null
                  user:
                    type: object
                    properties:
                      email:
                        type: string
                        format: email
                        example: "matthew.hung@example.com"
                      isActive:
                        type: boolean
                        example: true
                      isContractor:
                        type: boolean
                        example: true
                      phone:
                        type: string
                        example: "+1-555-123-4567"
                      jobTitle:
                        type: string
                        example: "Office 365 Engineer"
                      location:
                        type: string
                        example: "Arden, California"
                      name:
                        type: string
                        example: "Matthew Hung"

                    nullable: true
                  osVersion:
                    type: string
                    nullable: true
                    example: Windows 11 23H2
                    enum:
                      - Windows 11 23H2
                      - Windows 11 24H2
                      - Windows 10
                      - null

        "401":
          description: Unauthorized – Authentication required
          content:
            application/json:
              schema:
                type: object
              example:
                error: "Missing client secret"
                details: "Please provide x-client-secret in the request headers."
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                type: object
              example:
                error: "Dataverse query failed"
                details: "error"
        "404":
          description: Resource Not Found
          content:
            application/json:
              schema:
                type: object
              example:
                error: "Dataverse query failed"
                details: "Resource Not Found"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                type: object
              example:
                error: "Dataverse query failed"
                details: "Request failed with invalid authorization status code 403"
