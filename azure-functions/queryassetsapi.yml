openapi: '3.0.3'
info:
  title: Query Assets
  version: '1.0'

servers:
  - url: /api

components:
  responses:
    BadRequest:
      description: Bad Request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiResponse'
          example:
            message: 'Dataverse query failed'
            data: 'Request failed with status code 400'

    Unauthorized:
      description: Unauthorized – Authentication required
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiResponse'
          example:
            message: 'Missing client secret'
            data: null

    Forbidden:
      description: Forbidden
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiResponse'
          example:
            message: 'Unauthorized'
            data: null

    NotFound:
      description: Resource Not Found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiResponse'
          example:
            message: 'Resource not found'
            data: null

    InternalServerError:
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiResponse'
          example:
            message: 'Dataverse asset lookup failed'
            data: null

  schemas:
    ApiResponse:
      type: object
      properties:
        message:
          type: string
        data:
          nullable: true

    Asset:
      type: object
      properties:
        activation:
          type: boolean
          nullable: true
        assetName:
          type: string
        condition:
          type: string
          enum: [Excellent, Good, Poor, Garbage, Damaged, New]
        itemStatus:
          type: string
          enum:
            [
              Assigned,
              Available,
              Kiosk,
              Recycled,
              Decommissioned,
              Repair,
              Inoperative,
              Unknown,
              'Excess in Depot',
            ]
        location:
          type: string
          nullable: true
        osVersion:
          type: string
          nullable: true
          enum: [Windows 11 23H2, Windows 11 24H2, Windows 10]
        phone:
          type: string
          nullable: true
        user:
          type: object
          nullable: true
          properties:
            email:
              type: string
              format: email
            isActive:
              type: boolean
            isContractor:
              type: boolean
            phone:
              type: string
              nullable: true
            jobTitle:
              type: string
            location:
              type: string
            name:
              type: string
    JobTitles:
      type: object
      properties:
        jobTitle:
          type: string
          example: 'Engineer'
          nullable: false
        requiredAssets:
          type: array
          items:
            type: object
            properties:
              assetType:
                type: string
                example: 'Monitor'
                description: Type/category of the asset (e.g., Laptop, Docking Station)
              minimumQuantity:
                type: integer
                example: 1
                description: Minimum number of assets required
              maximumQuantity:
                type: integer
                example: 2
                description: Maximum number of assets allowed
              models:
                type: array
                items:
                  type: object
                  properties:
                    modelName:
                      type: string
                      example: 'EliteDisplay 231i'
                      description: Name of the specific Model
                    modelMaximum:
                      type: integer
                      example: 2
                      description: Maximum number of assets required for this specific model
                    modelMinimum:
                      type: integer
                      example: 1
                      description: Minimum number of assets required for this specfic model

paths:
  /v1/assets/{itemguid}:
    get:
      parameters:
        - name: itemguid
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/Asset'
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }

  /v1/assets/{assetid}/assignments/{userid}:
    post:
      parameters:
        - name: assetid
          in: path
          required: true
          schema: { type: string }
        - name: userid
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Successful update
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        type: string
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }

  /v1/assets/{assetid}/assignments:
    delete:
      parameters:
        - name: assetid
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Successful update
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        type: string
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }

  /v1/assets/{assetid}/location/{locationId}:
    post:
      parameters:
        - name: assetid
          in: path
          required: true
          schema: { type: string }
        - name: locationId
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Successful update
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        type: string
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }

  /v1/assets/{assetid}/location:
    delete:
      parameters:
        - name: assetid
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Successful update
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        type: string
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }

  /v1/users/email/{email}/assets:
    get:
      parameters:
        - name: email
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Returns all assets assigned to a user
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/Asset'
        '500': { $ref: '#/components/responses/InternalServerError' }
  /v1/titleinfo/{jobTitle}:
    get:
      parameters:
        - name: jobTitle
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Returns all assets required by Job Title
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        type: object
                        $ref: '#/components/schemas/JobTitles'
        '500': { $ref: '#/components/responses/InternalServerError' }
        '404': { $ref: '#/components/responses/NotFound' }
