openapi: '3.0.3'
info:
  title: Query Assets
  version: '1.0'

servers:
  - url: /api

components:
  responses:
    SuccessResponse:
      description: Successful request
      content:
        application/json:
          schema:
            type: object
            properties:
              message:
                type: string
              data: {}

    BadRequest:
      description: Bad Request
      content:
        application/json:
          schema:
            type: object
          example:
            message: 'Dataverse query failed'
            data: 'Request failed with status code 400'

    Unauthorized:
      description: Unauthorized – Authentication required
      content:
        application/json:
          schema:
            type: object
          example:
            message: 'Missing client secret'
            data: null

    Forbidden:
      description: Forbidden
      content:
        application/json:
          schema:
            type: object
          example:
            message: 'Unauthorized'
            data: null

    NotFound:
      description: Resource Not Found
      content:
        application/json:
          schema:
            type: object
          example:
            message: 'Resource not found'
            data: null

    InternalServerError:
      description: Internal server error
      content:
        application/json:
          schema:
            type: object
          example:
            message: 'Dataverse asset lookup failed'
            data: null

paths:
  /v1/assets/{itemguid}:
    get:
      parameters:
        - name: guid
          in: query
          required: true
          schema:
            type: string

      responses:
        '200':
          allOf:
            - $ref: '#/components/responses/SuccessResponse'
            - content:
                application/json:
                  schema:
                    type: object
                    properties:
                      data:
                        type: object
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }

  /v1/assets/{assetid}/assignments/{userid}:
    post:
      parameters:
        - name: assetid
          in: query
          required: true
          schema: { type: string }
        - name: userid
          in: query
          required: true
          schema: { type: string }

      responses:
        '200':
          allOf:
            - $ref: '#/components/responses/SuccessResponse'
            - content:
                application/json:
                  schema:
                    type: object
                    properties:
                      data:
                        type: string
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }

  /v1/assets/{assetid}/assignments:
    delete:
      parameters:
        - name: assetid
          in: query
          required: true
          schema: { type: string }

      responses:
        '200':
          allOf:
            - $ref: '#/components/responses/SuccessResponse'
            - content:
                application/json:
                  schema:
                    type: object
                    properties:
                      data:
                        type: string
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }

  /v1/assets/{assetid}/location/{locationId}:
    post:
      parameters:
        - name: assetid
          in: query
          required: true
          schema: { type: string }
        - name: locationId
          in: query
          required: true
          schema: { type: string }

      responses:
        '200':
          allOf:
            - $ref: '#/components/responses/SuccessResponse'
            - content:
                application/json:
                  schema:
                    type: object
                    properties:
                      data:
                        type: string
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }

  /v1/assets/{assetid}/location:
    delete:
      parameters:
        - name: assetid
          in: query
          required: true
          schema: { type: string }

      responses:
        '200':
          allOf:
            - $ref: '#/components/responses/SuccessResponse'
            - content:
                application/json:
                  schema:
                    type: object
                    properties:
                      data:
                        type: string
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }

  /v1/users/email/{email}/assets:
    get:
      parameters:
        - name: email
          in: query
          required: true
          schema: { type: string }

      responses:
        '200':
          allOf:
            - $ref: '#/components/responses/SuccessResponse'
            - content:
                application/json:
                  schema:
                    type: object
                    properties:
                      data:
                        type: array
                        items:
                          type: object
        '500': { $ref: '#/components/responses/InternalServerError' }
