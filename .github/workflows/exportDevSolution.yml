name: export-solution-on-dev
# Export solution from DEV environment
#  unpack it and prepare, commit and push a git branch with the changes

on:
  pull_request:

env:
  #edit your values here
  ENVIRONMENT_URL: ${{ secrets.DevEnviromentURL }}
  CLIENT_ID: ${{ secrets.DevAppId }}
  TENANT_ID: ${{ secrets.DevTenantId }}
  SOLUTION_NAME: "POCImportSolution"
  SOLUTION_EXPORTED_FOLDER: /out
  SOLUTION_FOLDER: /solution
  SOLUTION_TARGET_FOLDER: solution

permissions:
  contents: write
jobs:
  export-from-dev:
    runs-on: windows-latest
    # or you can say runs-on: ubuntu-latest
    env:
      RUNNER_DEBUG: 1

    steps:
      - uses: actions/checkout@v3
        with:
          lfs: true

      - name: Install PAC
        uses: microsoft/powerplatform-actions/actions-install@latest

      - name: who-am-i action
        uses: microsoft/powerplatform-actions/who-am-i@latest
        with:
          environment-url: ${{env.ENVIRONMENT_URL}}
          app-id: ${{env.CLIENT_ID}}
          client-secret: ${{ secrets.PowerPlatformSPN }}
          tenant-id: ${{env.TENANT_ID}}

      - name: export-solution action
        uses: microsoft/powerplatform-actions/export-solution@latest
        with:
          environment-url: ${{env.ENVIRONMENT_URL}}
          app-id: ${{env.CLIENT_ID}}
          client-secret: ${{ secrets.PowerPlatformSPN }}
          tenant-id: ${{env.TENANT_ID}}
          solution-name: ${{ env.SOLUTION_NAME }}
          solution-output-file: ${{ env.SOLUTION_EXPORTED_FOLDER}}/${{ env.SOLUTION_NAME }}.zip

      - name: unpack-solution action
        uses: microsoft/powerplatform-actions/unpack-solution@latest
        with:
          solution-file: ${{ env.SOLUTION_EXPORTED_FOLDER}}/${{ env.SOLUTION_NAME }}.zip
          solution-folder: ${{ env.SOLUTION_FOLDER }}/${{ env.SOLUTION_NAME }}
          solution-type: "Unmanaged"
          overwrite-files: true

      - name: Commit changes
        run: |
          cp -r ${{ env.SOLUTION_FOLDER }}/${{ env.SOLUTION_NAME }} ./${{ env.SOLUTION_FOLDER }}/${{ github.event.inputs.solution_name }}
          git config --global user.email "no-reply@github.com"
          git config --global user.name "GitHub Actions"
          git checkout main
          git add --all
          git commit -m "Updates from the dev environment"
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}
          git push
