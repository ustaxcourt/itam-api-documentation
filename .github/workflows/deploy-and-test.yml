name: Deploy and Test Deployed ITAM Function App

permissions:
  contents: write

on:
  pull_request:
    branches:
      - main
      - devTest
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment (dev | test | prod)"
        required: false
        type: choice
        options:
          - dev
          - test
          - prod

jobs:
  build-deploy-and-test:
    runs-on: ubuntu-latest

    # Expose env-specific secrets; we'll pick the right ones later.
    env:
      APP_NAME_DEV: ${{ secrets.AZURE_FUNCTIONAPP_NAME_DEV }}
      APP_NAME_TEST: ${{ secrets.AZURE_FUNCTIONAPP_NAME_TEST }}
      APP_NAME_PROD: ${{ secrets.AZURE_FUNCTIONAPP_NAME_PROD }}
      PUBLISH_PROFILE_DEV: ${{ secrets.AZURE_PUBLISH_PROFILE_DEV }}
      PUBLISH_PROFILE_TEST: ${{ secrets.AZURE_PUBLISH_PROFILE_TEST }}
      PUBLISH_PROFILE_PROD: ${{ secrets.AZURE_PUBLISH_PROFILE_PROD }}
      TENANTID: ${{ secrets.EXTERNALAUTHTENANTID }}

      DEVENVIROMENTURL: ${{ secrets.DevEnviromentURL }}
      TESTENVIROMENTURL: ${{ secrets.TestEnviromentURL }}

      DEVCLIENT_ID: ${{ secrets.EXTERNALAUTHDEVCLIENTID }}
      DEVCLIENT_SECRET: ${{ secrets.EXTERNALAUTHDEVCLIENTSECRET }}

      TESTCLIENT_ID: ${{ secrets.EXTERNALAUTHTESTCLIENTID }}
      TESTCLIENT_SECRET: ${{ secrets.EXTERNALAUTHTESTCLIENTSECRET }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        # fetch depth 0 means we are getting full history, valuable for our tags
        with:
          ref: ${{ github.ref }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "22.18.0"

      - name: Install Azure Functions Core Tools
        run: npm i -g azure-functions-core-tools@4 --unsafe-perm true

      - name: Install dependencies from root
        run: npm ci

      - name: Validate OpenAPI schema
        if: |
          steps.resolve_env.outputs.env_name == 'dev' ||
          steps.resolve_env.outputs.env_name == 'test'
        uses: thiyagu06/openapi-validator-action@v1
        with:
          filepath: "./azure-functions/openapi.yml"

      - name: Prepare function app package
        run: |
          mkdir functionapp
          cp host.json functionapp/
          cp package.json functionapp/
          cp -R azure-functions functionapp/
          cp -R node_modules functionapp/

      - name: Zip function app
        run: |
          cd functionapp
          zip -r ../functionapp.zip .

      # Decide environment:
      # - If workflow_dispatch has input, use it.
      # - Else map from branch: main -> dev, deployTest -> test, deployDev -> dev.
      # May want to consider removing deployTest/deployDev as branches / logic
      - name: Resolve target environment
        id: resolve_env
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" && -n "${{ github.event.inputs.environment }}" ]]; then
            env_name="${{ github.event.inputs.environment }}"
          else
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            branch="${{ github.base_ref }}"
            case "$branch" in
              main)        env_name="dev" ;;
              deployTest)  env_name="test" ;;
              deployDev)         env_name="dev"  ;;
              *)           echo "Unsupported branch for auto-deploy: $branch"; exit 1 ;;
            esac
          fi
          fi
          echo "env_name=$env_name" >> $GITHUB_OUTPUT
          echo "Resolved environment: $env_name"

      - name: Select env-specific secrets
        id: pick
        shell: bash
        run: |
          case "${{ steps.resolve_env.outputs.env_name }}" in
            dev)
              echo "APP_NAME=${APP_NAME_DEV}" >> $GITHUB_OUTPUT
              echo "PUBLISH_PROFILE=${PUBLISH_PROFILE_DEV}" >> $GITHUB_OUTPUT
              echo "CLIENTID=${DEVCLIENT_ID}" >> $GITHUB_OUTPUT
              echo "CLIENTSECRET=${DEVCLIENT_SECRET}" >> $GITHUB_OUTPUT
              ;;
            test)
              echo "APP_NAME=${APP_NAME_TEST}" >> $GITHUB_OUTPUT
              echo "PUBLISH_PROFILE=${PUBLISH_PROFILE_TEST}" >> $GITHUB_OUTPUT
              echo "CLIENTID=${TESTCLIENT_ID}" >> $GITHUB_OUTPUT
              echo "CLIENTSECRET=${TESTCLIENT_SECRET}" >> $GITHUB_OUTPUT
              ;;
            prod)
              echo "APP_NAME=${APP_NAME_PROD}" >> $GITHUB_OUTPUT
              echo "PUBLISH_PROFILE=${PUBLISH_PROFILE_PROD}" >> $GITHUB_OUTPUT
              ;;
            *)
              echo "Unknown environment: ${{ steps.resolve_env.outputs.env_name }}"; exit 1;
              ;;
          esac

      - name: Dump Kudu deployment logs (on failure)
        if: failure()
        shell: bash
        env:
          PUBLISH_PROFILE: ${{ steps.pick.outputs.PUBLISH_PROFILE }}
          APP_NAME: ${{ steps.pick.outputs.APP_NAME }}
        run: |
          set -euo pipefail

          # Extract SCM user/pass from publish profile XML (do not echo them)
          user=$(python3 - <<'PY'
          import os, re
          xml=os.environ["PUBLISH_PROFILE"]
          m=re.search(r'userName="([^"]+)"', xml)
          print(m.group(1) if m else "")
          PY
          )
              pass=$(python3 - <<'PY'
          import os, re
          xml=os.environ["PUBLISH_PROFILE"]
          m=re.search(r'userPWD="([^"]+)"', xml)
          print(m.group(1) if m else "")
          PY
          )

          scm="https://${APP_NAME}.scm.azurewebsites.net"
          echo "Querying Kudu logs from: $scm"

          # Get latest deployment id
          id=$(curl -sS -u "$user:$pass" "$scm/api/deployments/latest" | python3 -c "import sys,json; print(json.load(sys.stdin).get('id',''))")
          echo "Latest deployment id: $id"

          echo "---- Kudu deployment log ----"
          curl -sS -u "$user:$pass" "$scm/api/deployments/$id/log" | python3 -m json.tool || true

          echo "---- Kudu deployment details ----"
          curl -sS -u "$user:$pass" "$scm/api/deployments/$id" | python3 -m json.tool || true

      - name: Deploy to Azure Functions
        uses: Azure/functions-action@v1
        with:
          app-name: ${{ steps.pick.outputs.APP_NAME }}
          package: functionapp.zip
          publish-profile: ${{ steps.pick.outputs.PUBLISH_PROFILE }}

      # Starts off the testing piece in the same workflow
      # Currently set to run on dev/test only

      - name: Clean up temporary functionapp folder
        run: rm -rf functionapp

      - name: POST and parse JSON response for authentication
        id: api
        shell: bash

        run: |
          set -euo pipefail

          url="https://login.microsoftonline.com/${{ env.TENANTID }}/oauth2/v2.0/token"

          tmp_body="$(mktemp)"
          http_code=$(
            curl -sS -X POST "$url" \
              -H "Content-Type: application/x-www-form-urlencoded" \
              --data-urlencode "grant_type=client_credentials" \
              --data-urlencode "client_id=${{ steps.pick.outputs.CLIENTID }}" \
              --data-urlencode "client_secret=${{ steps.pick.outputs.CLIENTSECRET }}" \
              --data-urlencode "scope=api://ustc-itam-apis-authentication-${{ steps.resolve_env.outputs.env_name }}/.default" \
              -o "$tmp_body" \
              -w "%{http_code}"
          )

          echo "HTTP status: $http_code"

          if [[ "$http_code" != "200" ]]; then
            echo "Token request failed. Response body:"
            # Pretty-print if jq exists, otherwise raw
            if command -v jq >/dev/null 2>&1; then
              jq . < "$tmp_body" || cat "$tmp_body"
            else
              cat "$tmp_body"
            fi
            rm -f "$tmp_body"
            exit 1
          fi

          resp="$(cat "$tmp_body")"
          rm -f "$tmp_body"


          token=$(echo "$resp" | jq -r '.access_token')

          if [[ -z "$token" || "$token" == "null" ]]; then
            echo "ERROR: token missing from response"
            exit 1
          fi

          # Export as outputs for later steps
          echo "token=$token" >> "$GITHUB_OUTPUT"

      - name: Run integration tests
        if: |
          steps.resolve_env.outputs.env_name == 'dev' ||
          steps.resolve_env.outputs.env_name == 'test'
        env:
          API_BASE_URL: https://${{ steps.pick.outputs.APP_NAME }}.azurewebsites.net
          BEARERTOKEN: "Bearer ${{ steps.api.outputs.token }}"
        run: npx jest --selectProjects integration --coverage=false

      # Tag the deployed commit so it can be promoted later
      # Only tags the same SHA once in case someone deploys to dev manually
      - name: Tag dev deployment
        if: steps.resolve_env.outputs.env_name == 'dev' && github.event_name == 'push'
        shell: bash
        run: |
          DATE=$(date -u +"%d%b%y" | tr '[:upper:]' '[:lower:]')
          SHORT_SHA=$(echo "${GITHUB_SHA}" | cut -c1-7)
          TAG="dev-${DATE}-${SHORT_SHA}"

          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git tag "${TAG}"
          git push origin "${TAG}"

          echo "Tagged dev release: ${TAG}"
